# Corpus Roadmap — Canon Bot
# Tracks what's in the corpus, what's queued, and what's on the wish list.

current:
  eebo_tcp:
    description: "EEBO-TCP Phase I & II (TEI-XML, CC0)"
    coverage: "1473–1700"
    poets: 26
    chunks: ~29000
    status: complete

  obev:
    description: "Oxford Book of English Verse (Gutenberg #66619)"
    coverage: "1250–1900"
    poems: ~900
    poets: ~250
    status: parsing

  lucasta:
    description: "Lucasta by Richard Lovelace (Gutenberg #703)"
    coverage: "1649"
    poems: ~80
    status: complete

  pope_couplets:
    description: "Alexander Pope — Poetical Works (non-Homer), from popebot couplets"
    coverage: "1709–1744"
    couplets: 6616
    chunks: ~2322
    status: complete

queued:
  - id: "gutenberg_1934"
    title: "Songs of Innocence and Experience"
    author: "William Blake"
    gutenberg_id: 1934
    format: plaintext

  - id: "blake_prophetic"
    title: "Marriage of Heaven and Hell + selected prophetic books"
    author: "William Blake"
    notes: >
      EXCEPTION: include prose (Proverbs of Hell, aphorisms). Blake is the one
      author where the prose is canon-grade and indistinguishable from the poetry
      in function. Gutenberg #45315 (Poetry and Prose) may be best single source.

  - id: "gutenberg_9622"
    title: "Lyrical Ballads"
    author: "Wordsworth & Coleridge"
    gutenberg_id: 9622
    format: plaintext

  - id: "gutenberg_23684"
    title: "Poems"
    author: "John Keats"
    gutenberg_id: 23684
    format: plaintext

  - id: "rochester"
    title: "Poems (cleaner edition)"
    author: "John Wilmot, Earl of Rochester"
    notes: "Needs research for best Gutenberg source"

  - id: "gutenberg_18762"
    title: "Don Juan"
    author: "Lord Byron"
    gutenberg_id: 18762
    format: plaintext
    notes: "16 cantos, ottava rima. One of the longest canonical English poems."

  - id: "byron_selected"
    title: "Selected shorter poems (Childe Harold, lyrics, etc.)"
    author: "Lord Byron"
    notes: "Multiple Gutenberg sources — #6087 (Works vol 1-3), #21811 (Hebrew Melodies)"

  - id: "shelley_selected"
    title: "Selected poems"
    author: "Percy Bysshe Shelley"
    notes: "Multiple Gutenberg sources available"

  - id: "tennyson_selected"
    title: "Selected poems"
    author: "Alfred, Lord Tennyson"
    notes: "Multiple Gutenberg sources available"

  - id: "browning_bells"
    title: "Bells and Pomegranates (Dramatic Lyrics & Dramatic Romances)"
    author: "Robert Browning"
    notes: >
      Contains Porphyria's Lover, My Last Duchess, Soliloquy of the Spanish
      Cloister, The Pied Piper, etc. Gutenberg #16376 or similar.

  - id: "browning_dramatis"
    title: "Dramatis Personae"
    author: "Robert Browning"
    notes: "Caliban upon Setebos, Rabbi Ben Ezra, Abt Vogler, etc. Gutenberg #993."

  - id: "browning_men_women"
    title: "Men and Women"
    author: "Robert Browning"
    notes: "Fra Lippo Lippi, Andrea del Sarto, etc. Already on wish list, promoting."

  - id: "hardy_poems"
    title: "Wessex Poems + Poems of the Past and the Present + Time's Laughingstocks"
    author: "Thomas Hardy"
    notes: "Multiple Gutenberg sources. Promote from wish list — essential for late Victorian coverage."

  - id: "kipling_poems"
    title: "Selected poems (Barrack-Room Ballads, Departmental Ditties, The Years Between, etc.)"
    author: "Rudyard Kipling"
    notes: "Gutenberg has multiple collections. Died 1936, out of copyright."

  - id: "clare_poems"
    title: "Selected poems"
    author: "John Clare"
    notes: >
      Finding clean texts is the challenge. Gutenberg #22063 (Poems) exists but quality
      unknown. May need Standard Ebooks or manual sourcing. Worth the effort — no one
      else in the corpus does what Clare does with landscape and perception.

  - id: "smart_jubilate"
    title: "Jubilate Agno (esp. 'My Cat Jeoffry')"
    author: "Christopher Smart"
    notes: >
      The Jeoffry section is essential. Full Jubilate Agno on Gutenberg #35996.
      May already have fragments via ECPA or OBEV — check before duplicating.

  - id: "yeats_poems"
    title: "Collected poems (pre-1926 publications)"
    author: "W. B. Yeats"
    notes: >
      Died 1939, out of copyright in Ireland/EU (life+70 expired 2009). Gutenberg
      has early collections. The canon arguably ends here. Essential addition.

wish_list:
  - author: "John Suckling"
    title: "Fragmenta Aurea"
  - author: "Thomas Carew"
    title: "Poems"
  - author: "Christina Rossetti"
    title: "Selected poems"
  - author: "Emily Dickinson"
    title: "Public domain selections"
  - author: "Gerard Manley Hopkins"
    title: "Poems (1918 Bridges edition)"
  - author: "Elizabeth Barrett Browning"
    title: "Sonnets from the Portuguese"

sources:
  eebo_tcp:
    format: "TEI-XML"
    license: "CC0"
    coverage: "1473–1700"
  project_gutenberg:
    format: "HTML / plain text"
    license: "Public domain"
    coverage: "Pre-1929 publications"
  standard_ebooks:
    format: "Clean HTML/EPUB"
    license: "CC0"
    coverage: "Curated editions"
  ecpa:
    format: "TEI-XML"
    license: "CC BY-SA"
    coverage: "1700–1800 (Pope, Johnson, Gray, Collins, Smart)"
