<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canon Bot — Test UI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #f5f5f5; color: #1a1a1a; max-width: 720px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 1.3rem; margin-bottom: 16px; }
  textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ccc;
             border-radius: 8px; font: inherit; font-size: .95rem; resize: vertical; }
  textarea:focus { outline: none; border-color: #0066cc; }
  .controls { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  button { padding: 8px 20px; background: #0066cc; color: #fff; border: none;
           border-radius: 6px; font: inherit; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .spinner { display: none; width: 18px; height: 18px; border: 2px solid #ccc;
             border-top-color: #0066cc; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner.active { display: inline-block; }

  .result { background: #fff; border: 1px solid #ddd; border-radius: 10px;
            padding: 20px; margin-top: 20px; }
  .stimulus-echo { font-size: .85rem; color: #666; margin-bottom: 12px;
                   border-left: 3px solid #ddd; padding-left: 10px; }

  /* Triage */
  .triage { margin-bottom: 16px; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px;
           font-size: .8rem; font-weight: 600; text-transform: uppercase; }
  .badge.engage { background: #d4edda; color: #155724; }
  .badge.skip { background: #f8d7da; color: #721c24; }
  .triage-reason { font-size: .9rem; margin-top: 4px; }
  .triage-problem { font-style: italic; font-size: .9rem; color: #444; margin-top: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .chip { background: #e8e8e8; padding: 2px 8px; border-radius: 10px; font-size: .78rem; }

  /* Passages */
  details { margin-bottom: 16px; }
  summary { cursor: pointer; font-weight: 600; font-size: .9rem; }
  .passage { font-size: .82rem; padding: 8px; margin-top: 6px;
             background: #fafafa; border-radius: 6px; border: 1px solid #eee; }
  .passage-meta { color: #666; margin-bottom: 4px; }
  .passage-text { white-space: pre-wrap; font-family: "Georgia", serif;
                  font-size: .82rem; line-height: 1.5; }
  .distance { color: #999; font-size: .75rem; }

  /* Composition */
  .comp-section { margin-top: 8px; }
  .mode-badge { font-size: .75rem; background: #e0e7ff; color: #3730a3;
                padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .thread { margin-top: 10px; padding-left: 16px; border-left: 3px solid #0066cc; }
  .post-card { background: #fff; border: 1px solid #ddd; border-radius: 10px;
               padding: 14px 16px; max-width: 550px; margin-bottom: 10px;
               font-size: .92rem; line-height: 1.45; white-space: pre-wrap; }
  .char-count { font-size: .75rem; color: #888; margin-top: 4px; }
  .char-count.over { color: #dc3545; font-weight: 600; }
  .passage-ref { font-size: .8rem; color: #666; margin-top: 6px; }
  .skip-reason { color: #888; font-style: italic; }
</style>
</head>
<body>
<h1>Canon Bot — Test UI</h1>
<textarea id="stimulus" placeholder="Paste a post / stimulus here..."></textarea>
<div class="controls">
  <button id="btn" onclick="submitStimulus()">Submit</button>
  <div class="spinner" id="spinner"></div>
</div>
<div id="results"></div>

<script>
async function submitStimulus() {
  const ta = document.getElementById('stimulus');
  const text = ta.value.trim();
  if (!text) return;

  const btn = document.getElementById('btn');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  spinner.classList.add('active');

  try {
    const res = await fetch('/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({stimulus: text}),
    });
    const data = await res.json();
    renderResult(data);
    ta.value = '';
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
  }
}

// Submit on Cmd/Ctrl+Enter
document.getElementById('stimulus').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submitStimulus();
});

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderResult(data) {
  const div = document.createElement('div');
  div.className = 'result';

  const t = data.triage || {};
  const engage = t.engage;

  let html = `<div class="stimulus-echo">${esc(data.stimulus)}</div>`;

  // Triage
  html += `<div class="triage">`;
  html += `<span class="badge ${engage ? 'engage' : 'skip'}">${engage ? 'Engage' : 'Skip'}</span> `;
  html += `<span class="triage-reason">${esc(t.reason || '')}</span>`;
  if (t.the_problem) {
    html += `<div class="triage-problem">${esc(t.the_problem)}</div>`;
  }
  if (t.search_queries && t.search_queries.length) {
    html += `<div class="chips">${t.search_queries.map(q => `<span class="chip">${esc(q)}</span>`).join('')}</div>`;
  }
  html += `</div>`;

  // Passages
  if (data.passages && data.passages.length) {
    html += `<details><summary>Passages (${data.passages.length})</summary>`;
    for (const p of data.passages) {
      html += `<div class="passage">`;
      html += `<div class="passage-meta">${esc(p.poet)} — "${esc(p.poem_title)}" (${esc(p.date || '?')}) <span class="distance">d=${(p.distance || 0).toFixed(4)}</span></div>`;
      html += `<div class="passage-text">${esc(p.text)}</div>`;
      html += `</div>`;
    }
    html += `</details>`;
  }

  // Composition
  const comp = data.composition;
  if (comp) {
    html += `<div class="comp-section">`;
    if (comp.decision === 'post') {
      html += `<span class="mode-badge">${esc(comp.mode)}</span>`;
      html += `<div class="thread">`;
      for (let i = 0; i < comp.posts.length; i++) {
        const text = comp.posts[i];
        const len = text.length;
        html += `<div class="post-card">${esc(text)}</div>`;
        html += `<div class="char-count ${len > 300 ? 'over' : ''}">${len}/300</div>`;
      }
      html += `</div>`;
      const pu = comp.passage_used;
      if (pu) {
        html += `<div class="passage-ref">Anchored on: ${esc(pu.poet || '?')} — "${esc(pu.poem_title || '?')}"</div>`;
      }
    } else {
      html += `<div class="skip-reason">Skipped: ${esc(comp.skip_reason || comp.reason || '(no reason)')}</div>`;
    }
    html += `</div>`;
  }

  div.innerHTML = html;
  document.getElementById('results').prepend(div);
}
</script>
</body>
</html>
