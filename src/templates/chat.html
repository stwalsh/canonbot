<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucubrator</title>
<style>
:root {
  --paper: #faf8f4;
  --ink: #1a1814;
  --ink-muted: #6b6658;
  --rule: #d8d0bb;
  --accent: #8a2a2a;
  --serif: "EB Garamond", "Iowan Old Style", "Charter", "Palatino", Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper: #14110e;
    --ink: #ece4d0;
    --ink-muted: #8a8371;
    --rule: #33302a;
    --accent: #c27b5a;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 17px; }
body {
  font-family: var(--serif);
  color: var(--ink);
  background: var(--paper);
  line-height: 1.55;
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

header {
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--rule);
  text-align: center;
}
header h1 {
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: 0.01em;
}
header .status {
  font-size: 0.75rem;
  color: var(--ink-muted);
  font-family: var(--sans);
  margin-top: 0.2rem;
}

.chat-log {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.25rem;
  max-width: 42rem;
  margin: 0 auto;
  width: 100%;
}

.turn {
  margin-bottom: 1.25rem;
}
.turn-user {
  text-align: right;
}
.turn-user .bubble {
  background: var(--rule);
  display: inline-block;
  max-width: 80%;
  text-align: left;
  padding: 0.6rem 0.9rem;
  border-radius: 0.75rem 0.75rem 0.15rem 0.75rem;
}
.turn-bot .bubble {
  max-width: 90%;
  padding: 0.2rem 0;
}
.turn-bot .bubble p {
  margin-bottom: 0.5rem;
}
.turn-bot .bubble p:last-child {
  margin-bottom: 0;
}
.model-tag {
  font-family: var(--sans);
  font-size: 0.65rem;
  color: var(--accent);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 0.2rem;
}

.input-bar {
  border-top: 1px solid var(--rule);
  padding: 0.75rem 1.25rem;
  max-width: 42rem;
  margin: 0 auto;
  width: 100%;
  display: flex;
  gap: 0.6rem;
}
.input-bar textarea {
  flex: 1;
  font-family: var(--serif);
  font-size: 1rem;
  line-height: 1.45;
  color: var(--ink);
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 0.5rem;
  padding: 0.5rem 0.75rem;
  resize: none;
  min-height: 2.5rem;
  max-height: 8rem;
  overflow-y: auto;
}
.input-bar textarea:focus {
  outline: none;
  border-color: var(--ink-muted);
}
.input-bar button {
  font-family: var(--sans);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 0.5rem;
  padding: 0 1rem;
  cursor: pointer;
  align-self: flex-end;
  height: 2.5rem;
}
.input-bar button:disabled {
  opacity: 0.4;
  cursor: default;
}

.typing {
  color: var(--ink-muted);
  font-style: italic;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<header>
  <h1>Lucubrator</h1>
  <div class="status" id="status">connecting...</div>
</header>

<div class="chat-log" id="log"></div>

<div class="input-bar">
  <textarea id="input" rows="1" placeholder="Type here..." disabled></textarea>
  <button id="send" disabled>Send</button>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const status = document.getElementById('status');

let sessionId = null;
let userName = null;

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 128) + 'px';
});

// Enter to send (shift+enter for newline)
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
});

sendBtn.addEventListener('click', doSend);

function addTurn(role, text, model) {
  const div = document.createElement('div');
  div.className = `turn turn-${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'bot') {
    // Split on double newlines for paragraphs
    const paragraphs = text.split(/\n\n+/);
    paragraphs.forEach(p => {
      const pe = document.createElement('p');
      pe.textContent = p;
      bubble.appendChild(pe);
    });
    if (model === 'opus') {
      const tag = document.createElement('div');
      tag.className = 'model-tag';
      tag.textContent = 'opus';
      bubble.appendChild(tag);
    }
  } else {
    bubble.textContent = text;
  }

  div.appendChild(bubble);
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'turn turn-bot';
  div.id = 'typing';
  div.innerHTML = '<div class="typing">thinking...</div>';
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function setEnabled(on) {
  input.disabled = !on;
  sendBtn.disabled = !on;
  if (on) input.focus();
}

async function doSend() {
  const text = input.value.trim();
  if (!text) return;

  addTurn('user', text);
  input.value = '';
  input.style.height = 'auto';
  setEnabled(false);
  showTyping();

  try {
    const resp = await fetch('/chat/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: sessionId, message: text}),
    });
    const data = await resp.json();
    hideTyping();
    addTurn('bot', data.text, data.escalated ? 'opus' : 'sonnet');
  } catch (e) {
    hideTyping();
    addTurn('bot', 'Something went wrong. Try again?');
  }
  setEnabled(true);
}

// Startup: identify and get greeting
async function init() {
  // Check for cookie
  const match = document.cookie.match(/lucu_user=([^;]+)/);
  if (match) {
    userName = decodeURIComponent(match[1]);
  } else {
    userName = prompt("Who's here?");
    if (!userName) userName = 'someone';
    document.cookie = `lucu_user=${encodeURIComponent(userName)}; max-age=${60*60*24*365}; path=/`;
  }

  status.textContent = userName;

  try {
    const resp = await fetch('/chat/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_name: userName}),
    });
    const data = await resp.json();
    sessionId = data.session_id;
    addTurn('bot', data.greeting);
    setEnabled(true);
  } catch (e) {
    status.textContent = 'connection failed';
  }
}

init();
</script>
</body>
</html>
